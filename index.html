<!DOCTYPE html>
<html>
<head>
    <title>Platformer Test</title>
</head>
<body style="margin:0; overflow:hidden;">
<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x: 80,
    y: 300,
    w: 35,
    h: 45,
    vx: 0,
    vy: 0,
    onGround: false
};

let keys = {};

let platforms = [
    {x: 0, y: 430, w: 900, h: 70},
    {x: 180, y: 350, w: 160, h: 25},
    {x: 430, y: 290, w: 150, h: 25},
    {x: 680, y: 230, w: 140, h: 25}
];

let spikes = [
    {x: 360, y: 400, w: 30, h: 30},
    {x: 395, y: 400, w: 30, h: 30},
    {x: 600, y: 400, w: 30, h: 30}
];

let goal = {
    x: 760,
    y: 165,
    w: 45,
    h: 65
};

function rectsTouch(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function resetPlayer() {
    player.x = 80;
    player.y = 300;
    player.vx = 0;
    player.vy = 0;
}

function update() {
    if (keys["ArrowLeft"] || keys["a"]) {
        player.vx = -5;
    } else if (keys["ArrowRight"] || keys["d"]) {
        player.vx = 5;
    } else {
        player.vx *= 0.8;
    }

    if ((keys[" "] || keys["ArrowUp"] || keys["w"]) && player.onGround) {
        player.vy = -14;
        player.onGround = false;
    }

    player.vy += 0.7;

    if (player.vy > 16) {
        player.vy = 16;
    }

    player.x += player.vx;

    for (let p of platforms) {
        if (rectsTouch(player, p)) {
            if (player.vx > 0) {
                player.x = p.x - player.w;
            }

            if (player.vx < 0) {
                player.x = p.x + p.w;
            }

            player.vx = 0;
        }
    }

    player.y += player.vy;
    player.onGround = false;

    for (let p of platforms) {
        if (rectsTouch(player, p)) {
            if (player.vy > 0) {
                player.y = p.y - player.h;
                player.onGround = true;
            }

            if (player.vy < 0) {
                player.y = p.y + p.h;
            }

            player.vy = 0;
        }
    }

    for (let s of spikes) {
        if (rectsTouch(player, s)) {
            resetPlayer();
        }
    }

    if (rectsTouch(player, goal)) {
        alert("You win!");
        resetPlayer();
    }

    if (player.y > 700) {
        resetPlayer();
    }
}

function drawSpike(s) {
    ctx.fillStyle = "gray";
    ctx.beginPath();
    ctx.moveTo(s.x + s.w / 2, s.y);
    ctx.lineTo(s.x, s.y + s.h);
    ctx.lineTo(s.x + s.w, s.y + s.h);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "black";
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = "#86c5ff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#d2a85f";
    for (let p of platforms) {
        ctx.fillRect(p.x, p.y, p.w, p.h);

        ctx.strokeStyle = "#5b3b1d";
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    }

    for (let s of spikes) {
        drawSpike(s);
    }

    ctx.fillStyle = "#222222";
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

    ctx.fillStyle = "gold";
    ctx.fillRect(goal.x - 8, goal.y - 8, goal.w + 16, 10);
    ctx.fillRect(goal.x - 8, goal.y - 8, 10, goal.h + 16);
    ctx.fillRect(goal.x + goal.w - 2, goal.y - 8, 10, goal.h + 16);

    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.fillStyle = "black";
    ctx.fillRect(player.x + 8, player.y + 10, 5, 5);
    ctx.fillRect(player.x + 23, player.y + 10, 5, 5);

    ctx.beginPath();
    ctx.arc(player.x + 18, player.y + 27, 10, 0, Math.PI);
    ctx.stroke();

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("Platformer Test", 20, 40);

    ctx.font = "16px Arial";
    ctx.fillText("Move: A/D or arrows | Jump: W/Up/Space", 20, 65);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

document.addEventListener("keydown", function(e) {
    keys[e.key] = true;
});

document.addEventListener("keyup", function(e) {
    keys[e.key] = false;
});

loop();
</script>

</body>
</html>
